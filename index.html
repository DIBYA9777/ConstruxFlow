<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConstruxFlow | Construction ERP Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --pur1:#4a1472;--pur2:#7c3aed;--pur3:#a855f7;--pur4:#d8b4fe;--pur5:#f3e8ff;
  --amb1:#92400e;--amb2:#d97706;--amb3:#f59e0b;--amb4:#fcd34d;--amb5:#fef3c7;
  --eme1:#064e3b;--eme2:#059669;--eme3:#10b981;--eme4:#6ee7b7;--eme5:#d1fae5;
  --org2:#c2410c;--org3:#ea580c;--org4:#fb923c;
  --rose3:#f43f5e;--rose4:#fb7185;
  --bg-deep:#0f0720;--bg-mid:#1a0d2e;--bg-surface:#221240;
  --glass-pur:rgba(124,58,237,0.12);--glass-amb:rgba(245,158,11,0.1);
  --glass-eme:rgba(16,185,129,0.1);
  --border-pur:rgba(168,85,247,0.35);--border-amb:rgba(245,158,11,0.35);
  --border-eme:rgba(16,185,129,0.3);
  --text-main:#f5efff;--text-muted:#c4b5e8;--text-dim:#8b7aad;
  --radius-lg:24px;--radius-md:16px;--radius-sm:10px;
  --sidebar-w:270px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg-deep);
  color:var(--text-main);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 20%,rgba(124,58,237,0.35) 0%,transparent 60%),
    radial-gradient(ellipse 50% 60% at 90% 80%,rgba(245,158,11,0.2) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(16,185,129,0.08) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
/* FLOATING 3D ORBS */
.orb{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0;animation:orbFloat 8s ease-in-out infinite;}
.orb1{width:400px;height:400px;background:rgba(124,58,237,0.18);top:-100px;left:-100px;animation-delay:0s;}
.orb2{width:300px;height:300px;background:rgba(245,158,11,0.12);bottom:-80px;right:-80px;animation-delay:-3s;}
.orb3{width:250px;height:250px;background:rgba(16,185,129,0.1);top:50%;right:10%;animation-delay:-5s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-30px) scale(1.05);}}

/* GLASS MIXIN CLASSES */
.glass{
  background:rgba(26,13,46,0.6);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-pur);
  border-radius:var(--radius-lg);
}
.glass-card{
  background:rgba(34,18,64,0.55);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(168,85,247,0.25);
  border-radius:var(--radius-md);
  transition:transform 0.25s,border-color 0.25s,box-shadow 0.25s;
  position:relative;overflow:hidden;
}
.glass-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(168,85,247,0.06) 0%,transparent 60%);
  pointer-events:none;
}
.glass-card:hover{
  transform:translateY(-3px) perspective(500px) rotateX(1deg);
  border-color:var(--pur3);
  box-shadow:0 16px 40px rgba(124,58,237,0.25);
}
.glass-amb{
  background:rgba(34,18,64,0.55);
  backdrop-filter:blur(16px);
  border:1px solid rgba(245,158,11,0.3);
  border-radius:var(--radius-md);
}
.glass-eme{
  background:rgba(34,18,64,0.55);
  backdrop-filter:blur(16px);
  border:1px solid rgba(16,185,129,0.3);
  border-radius:var(--radius-md);
}

/* ===== LAYOUT ===== */
.app{display:flex;min-height:100vh;position:relative;z-index:1;}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-w);position:fixed;top:0;left:0;height:100vh;
  background:rgba(15,7,32,0.75);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-right:1px solid var(--border-pur);
  display:flex;flex-direction:column;padding:1.5rem 1rem;
  z-index:100;transition:transform 0.3s ease;overflow-y:auto;
}
.logo{
  display:flex;align-items:center;gap:12px;padding:0 8px;margin-bottom:2rem;
}
.logo-icon{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--pur2),var(--amb3));
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
  box-shadow:0 4px 16px rgba(124,58,237,0.4);
  animation:spinGlow 4s ease-in-out infinite;
}
@keyframes spinGlow{
  0%,100%{box-shadow:0 4px 16px rgba(124,58,237,0.4);}
  50%{box-shadow:0 4px 24px rgba(245,158,11,0.5);}
}
.logo-text{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;
  background:linear-gradient(135deg,var(--pur4),var(--amb4));
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.nav-section-title{font-size:0.65rem;font-weight:600;letter-spacing:0.12em;
  color:var(--text-dim);text-transform:uppercase;padding:0 12px;margin:1rem 0 0.4rem;}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 14px;
  border-radius:44px;cursor:pointer;transition:all 0.2s;
  font-size:0.9rem;font-weight:500;color:var(--text-muted);margin:3px 0;
}
.nav-item i{width:20px;font-size:1rem;text-align:center;}
.nav-item:hover{background:rgba(168,85,247,0.15);color:var(--text-main);}
.nav-item.active{
  background:linear-gradient(135deg,rgba(124,58,237,0.4),rgba(245,158,11,0.2));
  border:1px solid rgba(168,85,247,0.5);color:#fff;
  box-shadow:0 4px 16px rgba(124,58,237,0.2);
}
.nav-item.active i{color:var(--amb3);}
.sidebar-footer{margin-top:auto;padding:12px;border-radius:var(--radius-md);
  background:rgba(168,85,247,0.08);border:1px solid var(--border-pur);
  font-size:0.75rem;color:var(--text-dim);text-align:center;}

/* MAIN */
.main{margin-left:var(--sidebar-w);flex:1;padding:1.5rem 2rem;min-height:100vh;}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;margin-bottom:2rem;
  padding:12px 20px;border-radius:44px;
  background:rgba(26,13,46,0.6);
  backdrop-filter:blur(20px);
  border:1px solid var(--border-pur);
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.hamburger{background:none;border:none;color:var(--text-main);font-size:1.4rem;cursor:pointer;display:none;}
.page-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text-main);}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.badge{padding:6px 16px;border-radius:44px;font-size:0.8rem;font-weight:600;
  background:linear-gradient(135deg,rgba(124,58,237,0.4),rgba(245,158,11,0.3));
  border:1px solid rgba(168,85,247,0.4);color:var(--amb4);}
.role-select{
  background:rgba(26,13,46,0.7);border:1px solid var(--border-pur);
  border-radius:44px;padding:6px 14px;color:var(--text-main);
  font-size:0.85rem;cursor:pointer;outline:none;
}
.theme-btn{
  background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);
  border-radius:44px;padding:6px 14px;color:var(--amb3);cursor:pointer;
  font-size:0.85rem;font-weight:500;transition:0.2s;
}
.theme-btn:hover{background:rgba(245,158,11,0.25);}

/* MODULE AREA */
.module-area{animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* HEADINGS */
h1,h2,h3,h4{font-family:'Syne',sans-serif;}
.mod-header{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;margin-bottom:1.5rem;
}
.mod-title{font-size:1.6rem;font-weight:700;color:var(--text-main);}
.mod-title span{
  background:linear-gradient(135deg,var(--pur4),var(--amb3));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem;}
.stat-card{padding:1.2rem 1.4rem;position:relative;overflow:hidden;}
.stat-card::after{
  content:'';position:absolute;top:-30px;right:-30px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(168,85,247,0.12);
}
.stat-icon{font-size:1.8rem;margin-bottom:8px;}
.stat-val{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:700;
  background:linear-gradient(135deg,var(--pur4),var(--amb4));
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.stat-label{font-size:0.8rem;color:var(--text-muted);margin-top:2px;}
.stat-trend{font-size:0.8rem;margin-top:6px;}
.trend-up{color:var(--eme3);}
.trend-dn{color:var(--rose3);}

/* TABLES */
.table-wrap{overflow-x:auto;border-radius:var(--radius-md);}
.data-table{width:100%;border-collapse:collapse;min-width:500px;}
.data-table thead tr{
  background:rgba(124,58,237,0.2);
}
.data-table th{
  padding:12px 16px;text-align:left;font-size:0.78rem;
  font-weight:600;color:var(--pur4);letter-spacing:0.06em;text-transform:uppercase;
}
.data-table td{padding:11px 16px;font-size:0.88rem;color:var(--text-muted);
  border-bottom:1px solid rgba(168,85,247,0.12);}
.data-table tbody tr{transition:background 0.15s;}
.data-table tbody tr:hover{background:rgba(168,85,247,0.08);}
.data-table tbody tr:last-child td{border-bottom:none;}

/* STATUS PILLS */
.pill{display:inline-block;padding:3px 12px;border-radius:44px;font-size:0.75rem;font-weight:600;}
.pill-pur{background:rgba(168,85,247,0.2);color:var(--pur4);border:1px solid rgba(168,85,247,0.35);}
.pill-eme{background:rgba(16,185,129,0.15);color:var(--eme3);border:1px solid rgba(16,185,129,0.35);}
.pill-amb{background:rgba(245,158,11,0.15);color:var(--amb3);border:1px solid rgba(245,158,11,0.35);}
.pill-rose{background:rgba(244,63,94,0.15);color:var(--rose4);border:1px solid rgba(244,63,94,0.35);}
.pill-org{background:rgba(234,88,12,0.15);color:var(--org4);border:1px solid rgba(234,88,12,0.35);}

/* BUTTONS */
.btn{
  padding:8px 18px;border-radius:44px;font-size:0.85rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;border:none;font-family:'DM Sans',sans-serif;
  display:inline-flex;align-items:center;gap:7px;
}
.btn-pur{
  background:linear-gradient(135deg,var(--pur2),var(--pur3));
  color:#fff;box-shadow:0 4px 14px rgba(124,58,237,0.35);
}
.btn-pur:hover{box-shadow:0 6px 20px rgba(124,58,237,0.5);transform:translateY(-1px);}
.btn-amb{
  background:linear-gradient(135deg,var(--amb2),var(--amb3));
  color:#fff;box-shadow:0 4px 14px rgba(245,158,11,0.3);
}
.btn-amb:hover{box-shadow:0 6px 20px rgba(245,158,11,0.45);transform:translateY(-1px);}
.btn-eme{
  background:linear-gradient(135deg,var(--eme2),var(--eme3));
  color:#fff;box-shadow:0 4px 14px rgba(16,185,129,0.3);
}
.btn-eme:hover{box-shadow:0 6px 20px rgba(16,185,129,0.45);transform:translateY(-1px);}
.btn-out{
  background:transparent;border:1px solid var(--border-pur);color:var(--pur4);
}
.btn-out:hover{background:rgba(168,85,247,0.15);}
.btn-danger{
  background:transparent;border:1px solid rgba(244,63,94,0.4);color:var(--rose4);
}
.btn-danger:hover{background:rgba(244,63,94,0.15);}
.btn-sm{padding:5px 12px;font-size:0.78rem;}
.btn-xs{padding:3px 10px;font-size:0.72rem;}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{font-size:0.78rem;font-weight:600;color:var(--text-dim);letter-spacing:0.05em;text-transform:uppercase;}
.form-control{
  background:rgba(26,13,46,0.7);border:1px solid var(--border-pur);
  border-radius:var(--radius-sm);padding:10px 14px;
  color:var(--text-main);font-family:'DM Sans',sans-serif;font-size:0.88rem;
  outline:none;transition:border-color 0.2s;
}
.form-control:focus{border-color:var(--pur3);box-shadow:0 0 0 3px rgba(168,85,247,0.15);}
textarea.form-control{resize:vertical;min-height:80px;}
select.form-control option{background:#1a0d2e;}

/* SEARCH BAR */
.search-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:1.2rem;
}
.search-input-wrap{position:relative;flex:1;min-width:200px;}
.search-input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);}
.search-input{
  width:100%;background:rgba(26,13,46,0.7);border:1px solid var(--border-pur);
  border-radius:44px;padding:9px 14px 9px 40px;color:var(--text-main);
  font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;
  transition:border-color 0.2s;
}
.search-input:focus{border-color:var(--pur3);}

/* PROGRESS BAR */
.progress-wrap{background:rgba(168,85,247,0.15);border-radius:44px;height:8px;overflow:hidden;}
.progress-bar{height:100%;border-radius:44px;
  background:linear-gradient(90deg,var(--pur2),var(--amb3));transition:width 0.6s ease;}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,7,32,0.85);
  backdrop-filter:blur(10px);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  animation:fadeIn 0.2s ease;
}
.modal-box{
  background:rgba(26,13,46,0.95);border:1px solid var(--border-pur);
  border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:560px;
  box-shadow:0 24px 60px rgba(124,58,237,0.3);
  animation:slideUp 0.3s ease;
}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-title{font-size:1.3rem;font-weight:700;margin-bottom:1.5rem;
  background:linear-gradient(135deg,var(--pur4),var(--amb3));
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem;}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:rgba(26,13,46,0.95);border:1px solid var(--border-pur);
  border-radius:44px;padding:12px 24px;z-index:9999;
  display:flex;align-items:center;gap:10px;font-size:0.88rem;
  box-shadow:0 8px 32px rgba(124,58,237,0.3);
  animation:toastIn 0.3s ease;
}
@keyframes toastIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.toast-icon-pur{color:var(--pur3);}
.toast-icon-eme{color:var(--eme3);}
.toast-icon-amb{color:var(--amb3);}
.toast-icon-rose{color:var(--rose3);}

/* SECTION DIVIDER */
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(168,85,247,0.4),transparent);margin:1.5rem 0;}

/* GANTT */
.gantt-wrap{overflow-x:auto;}
.gantt-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.gantt-label{width:140px;font-size:0.82rem;color:var(--text-muted);flex-shrink:0;}
.gantt-track{flex:1;height:24px;background:rgba(168,85,247,0.1);border-radius:44px;position:relative;min-width:200px;}
.gantt-bar{height:100%;border-radius:44px;display:flex;align-items:center;padding-left:10px;
  font-size:0.7rem;font-weight:600;color:#fff;position:absolute;top:0;}

/* 3D CARD PERSPECTIVE */
.card-3d{transform-style:preserve-3d;perspective:800px;}
.card-3d:hover .glass-card{transform:translateY(-4px) rotateX(2deg) rotateY(-1deg);}

/* LOGIN */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:1rem;position:relative;z-index:1;
}
.login-box{
  width:100%;max-width:420px;padding:2.5rem;
  background:rgba(26,13,46,0.8);backdrop-filter:blur(24px);
  border:1px solid var(--border-pur);border-radius:var(--radius-lg);
  box-shadow:0 24px 60px rgba(124,58,237,0.3);
}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-3d-icon{
  width:80px;height:80px;border-radius:20px;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--pur2),var(--amb3));
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;
  animation:float3d 3s ease-in-out infinite;
  box-shadow:0 8px 32px rgba(124,58,237,0.5);
}
@keyframes float3d{
  0%,100%{transform:translateY(0) rotateY(0deg);}
  25%{transform:translateY(-8px) rotateY(8deg);}
  75%{transform:translateY(-4px) rotateY(-8deg);}
}

/* CHART CONTAINER */
.chart-wrap{position:relative;height:220px;}

/* ACCORDION */
.accordion-item{border:1px solid var(--border-pur);border-radius:var(--radius-md);
  margin-bottom:8px;overflow:hidden;}
.accordion-head{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;background:rgba(168,85,247,0.08);font-weight:500;font-size:0.9rem;}
.accordion-body{padding:12px 16px;font-size:0.85rem;color:var(--text-muted);
  display:none;border-top:1px solid rgba(168,85,247,0.15);}
.accordion-body.open{display:block;}

/* TIMELINE */
.timeline-item{display:flex;gap:16px;margin-bottom:1rem;padding-bottom:1rem;
  border-bottom:1px solid rgba(168,85,247,0.12);}
.timeline-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;font-size:0.9rem;}

/* LIGHT THEME */
body.light{
  --bg-deep:#f0ebff;--bg-mid:#e8dffe;--bg-surface:#ddd0ff;
  --text-main:#1a0d2e;--text-muted:#4a3270;--text-dim:#7c5fa3;
  --glass-pur:rgba(124,58,237,0.08);
}
body.light .glass{background:rgba(240,235,255,0.8);}
body.light .glass-card{background:rgba(232,223,254,0.7);border-color:rgba(124,58,237,0.25);}
body.light .sidebar{background:rgba(230,220,255,0.9);}
body.light .topbar{background:rgba(240,235,255,0.8);}
body.light .form-control,body.light .search-input,body.light .role-select{
  background:rgba(240,235,255,0.9);color:var(--text-main);}
body.light .modal-box{background:rgba(240,235,255,0.97);}
body.light .data-table td{color:var(--text-muted);}

/* RESPONSIVE */
@media(max-width:820px){
  :root{--sidebar-w:0px;}
  .sidebar{transform:translateX(-270px);width:270px;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;padding:1rem;}
  .hamburger{display:flex;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .form-grid{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr;}
  .topbar-right{gap:6px;}
  .badge{display:none;}
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-3d-icon">🏗️</div>
      <div style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;
        background:linear-gradient(135deg,#d8b4fe,#f59e0b);-webkit-background-clip:text;background-clip:text;color:transparent;">
        ConstruxFlow
      </div>
      <div style="color:var(--text-muted);font-size:0.85rem;margin-top:4px;">Construction Management Suite v3.0</div>
    </div>
    <div class="form-group" style="margin-bottom:1rem;">
      <label>Email / Username</label>
      <input class="form-control" id="loginUser" value="admin@construxflow.com" placeholder="Enter email">
    </div>

function statusPill(s){

           pending:'pill-amb',submitted:'pill-amb',issued:'pill-pur',maintenance:'pill-org',
           inactive:'pill-rose',floating:'pill-pur',idle:'pill-amb',completing:'pill-amb'};
  return `<span class="pill ${m[s]||'pill-pur'}">${s}</span>`;
}
function addLog(action,user){

}
function toast(msg,type='pur'){
  const icons={pur:'fa-check-circle',eme:'fa-check-circle',amb:'fa-info-circle',rose:'fa-exclamation-circle'};
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<i class="fas ${icons[type]||'fa-check-circle'} toast-icon-${type}"></i><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(20px)';setTimeout(()=>t.remove(),400);},2800);
}

function buildSidebar(){
  const nav=document.getElementById('navList');
  nav.innerHTML='<div class="nav-section-title">Modules</div>';
  Object.entries(MODULE_META).forEach(([key,m])=>{
    const d=document.createElement('div');
    d.className='nav-item'+(activeModule===key?' active':'');
    d.dataset.mod=key;
    d.innerHTML=`<i class="fas ${m.icon}"></i><span>${m.label}</span>`;
    d.onclick=()=>{
      activeModule=key;
      document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');
      document.getElementById('pageTitle').textContent=m.label;
      renderModule(key);
      if(window.innerWidth<=820) document.getElementById('sidebar').classList.remove('open');
    };
    nav.appendChild(d);
  });
}

    area.innerHTML=(renders[mod]||renderAdmin)();
    area.style.opacity='1';

    if(mod==='project') initGantt();
    if(mod==='production') initProdChart();
    addLog('Viewed module: '+mod);

}

function initMISCharts(){

window.saveOutward=()=>{
  const matId=+document.getElementById('out_mat').value;
  const qty=+document.getElementById('out_qty').value;
  const mat=DB.materials.find(m=>m.id===matId);
  if(!qty){toast('Enter quantity','rose');return;}

    material:mat.name,type:'outward',qty,project:proj,remark:'Site issue'});
  closeModal();toast(`${qty} ${mat.unit} issued to ${proj.split(' ')[0]}`,'eme');renderModule('store');
};

  closeModal();toast('Project updated!','eme');document.getElementById('projTbody').innerHTML=projectRows();
};
window.deleteProject=(id)=>{DB.projects=DB.projects.filter(p=>p.id!==id);toast('Project removed','rose');document.getElementById('projTbody').innerHTML=projectRows();};

// ===================== 9. PRODUCTION =====================
function renderProduction(){
  return `
  <div class="mod-header">
    <div class="mod-title">Production <span>Planning</span></div>
    <button class="btn btn-pur" onclick="openNewBatch()"><i class="fas fa-plus"></i> New Batch</button>
  </div>
  <div class="stats-grid">
    <div class="glass-card stat-card"><div class="stat-icon">🏭</div><div class="stat-val">${DB.production.length}</div><div class="stat-label">Active Batches</div></div>
    <div class="glass-card stat-card"><div class="stat-icon">📊</div><div class="stat-val">${Math.round(DB.production.reduce((s,p)=>s+(p.produced/p.target),0)/DB.production.length*100)}%</div><div class="stat-label">Avg. Achievement</div></div>
    <div class="glass-card stat-card"><div class="stat-icon">🎯</div><div class="stat-val">${fmtN(DB.production.reduce((s,p)=>s+p.target,0))}</div><div class="stat-label">Total Target</div></div>
    <div class="glass-card stat-card"><div class="stat-icon">✅</div><div class="stat-val">${fmtN(DB.production.reduce((s,p)=>s+p.produced,0))}</div><div class="stat-label">Total Produced</div></div>
  </div>

  <div class="glass-card" style="padding:1.5rem;margin-bottom:1.5rem;">
    <div class="mod-header"><h3 style="font-size:1rem;">📊 Production vs Target</h3></div>
    <div class="chart-wrap"><canvas id="prodChart"></canvas></div>
  </div>

  <div class="glass-card" style="padding:1.5rem;margin-bottom:1.5rem;">
    <div class="mod-header"><h3 style="font-size:1rem;">🏭 Production Batches</h3></div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>#</th><th>Product / Grade</th><th>Target</th><th>Produced</th><th>Unit</th><th>Achievement</th><th>Project</th><th>Action</th></tr></thead>
        <tbody id="prodTbody">${prodRows()}</tbody>
      </table>
    </div>
  </div>

  <div class="glass-card" style="padding:1.5rem;">
    <h3 style="margin-bottom:1rem;font-size:1rem;">🧱 Raw Material Consumption</h3>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Material</th><th>Opening Stock</th><th>Consumed</th><th>Closing Stock</th><th>Unit</th></tr></thead>
        <tbody>
          <tr><td>Cement OPC 53</td><td>6200</td><td>800</td><td>5400</td><td>Bags</td></tr>
          <tr><td>TMT Steel Fe500</td><td>1400</td><td>150</td><td>1250</td><td>MT</td></tr>
          <tr><td>Coarse Aggregate</td><td>1200</td><td>220</td><td>980</td><td>MT</td></tr>
        </tbody>
      </table>
    </div>
  </div>`;
}
function prodRows(){
  return DB.production.map(p=>{
    const pct=Math.round(p.produced/p.target*100);
    return `<tr><td>${p.id}</td><td><strong>${p.product}</strong></td>
      <td>${fmtN(p.target)}</td><td>${fmtN(p.produced)}</td><td>${p.unit}</td>
      <td><div class="progress-wrap" style="width:80px;display:inline-block;vertical-align:middle;"><div class="progress-bar" style="width:${pct}%"></div></div> ${pct}%</td>
      <td>${p.project}</td>
      <td><button class="btn btn-eme btn-xs" onclick="updateProd(${p.id})">Update</button></td>
      </tr>`;}).join('');
}
function initProdChart(){
  const ctx=document.getElementById('prodChart');
  if(!ctx) return;
  new Chart(ctx,{type:'bar',data:{
    labels:DB.production.map(p=>p.product),
    datasets:[
      {label:'Target',data:DB.production.map(p=>p.target),backgroundColor:'rgba(168,85,247,0.5)',borderRadius:6},
      {label:'Produced',data:DB.production.map(p=>p.produced),backgroundColor:'rgba(16,185,129,0.5)',borderRadius:6}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'var(--text-muted)'}}},
      scales:{x:{grid:{color:'rgba(168,85,247,0.1)'},ticks:{color:'var(--text-muted)'}},
              y:{grid:{color:'rgba(168,85,247,0.1)'},ticks:{color:'var(--text-muted)'}}}
    }});
}
window.openNewBatch=()=>{
  showModal(`<div class="modal-box">
    <div class="modal-title">🏭 New Production Batch</div>
    <div class="form-grid" style="grid-template-columns:1fr;">
      <div class="form-group"><label>Product / Grade</label><input class="form-control" id="pb_prod" placeholder="e.g. M25 Concrete, Precast Slab"></div>
      <div class="form-group"><label>Target Quantity</label><input class="form-control" type="number" id="pb_target" placeholder="0"></div>
      <div class="form-group"><label>Unit</label>
        <select class="form-control" id="pb_unit"><option>Cum</option><option>Nos</option><option>MT</option><option>Bags</option></select>
      </div>
      <div class="form-group"><label>Project</label>
        <select class="form-control" id="pb_proj">${DB.projects.map(p=>`<option>${p.name.split(' ')[0]}</option>`).join('')}</select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-out" onclick="closeModal()">Cancel</button>
      <button class="btn btn-pur" onclick="saveBatch()">Start Batch</button>
    </div>
  </div>`);
};
window.saveBatch=()=>{
  const prod=document.getElementById('pb_prod').value;
  if(!prod){toast('Enter product name','rose');return;}
  DB.production.push({id:DB.production.length+10,product:prod,
    target:+document.getElementById('pb_target').value,produced:0,
    unit:document.getElementById('pb_unit').value,
    project:document.getElementById('pb_proj').value,date:new Date().toISOString().slice(0,7)});
  closeModal();toast('Batch created!','eme');renderModule('production');
};
window.updateProd=(id)=>{
  const p=DB.production.find(x=>x.id===id);
  const qty=+prompt(`Update produced quantity for ${p.product} (current: ${p.produced}):`);
  if(qty>=0){p.produced=qty;toast('Production updated!','eme');document.getElementById('prodTbody').innerHTML=prodRows();}
};

// ===================== 10. TENDER =====================
function renderTender(){
  return `
  <div class="mod-header">
    <div class="mod-title">Tender <span>Management</span></div>
    <button class="btn btn-pur" onclick="openNewTender()"><i class="fas fa-plus"></i> New Tender</button>
  </div>
  <div class="stats-grid">
    <div class="glass-card stat-card"><div class="stat-icon">📄</div><div class="stat-val">${DB.tenders.length}</div><div class="stat-label">Total Tenders</div></div>
    <div class="glass-card stat-card"><div class="stat-icon">🏆</div><div class="stat-val">${DB.tenders.filter(t=>t.status==='won').length}</div><div class="stat-label">Won</div><div class="stat-trend trend-up"><i class="fas fa-arrow-up"></i> 50% win rate</div></div>
    <div class="glass-card stat-card"><div class="stat-icon">⏳</div><div class="stat-val">${DB.tenders.filter(t=>t.status==='submitted').length}</div><div class="stat-label">Awaiting Result</div></div>
    <div class="glass-card stat-card"><div class="stat-icon">💰</div><div class="stat-val">₹${(DB.tenders.reduce((s,t)=>s+t.estValue,0)/10000000).toFixed(0)}Cr</div><div class="stat-label">Pipeline Value</div></div>
  </div>

  <div class="glass-card" style="padding:1.5rem;margin-bottom:1.5rem;">
    <div class="mod-header"><h3 style="font-size:1rem;">📋 Tender Tracker</h3></div>
    <div class="search-bar">
      <div class="search-input-wrap"><i class="fas fa-search"></i><input class="search-input" placeholder="Search tenders..." oninput="filterTenders(this.value)"></div>
      <select class="form-control" style="max-width:160px;border-radius:44px;" onchange="filterTendersStatus(this.value)">
        <option value="">All Status</option>
        <option>floating</option><option>submitted</option><option>won</option><option>lost</option>
      </select>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Tender ID</th><th>Title</th><th>Client</th><th>Est. Value</th><th>Float Date</th><th>Submit Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="tenderTbody">${tenderRows()}</tbody>
      </table>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;">
    <div class="glass-card" style="padding:1.5rem;">
      <h3 style="margin-bottom:1rem;font-size:1rem;">📁 BOQ Repository</h3>
      ${DB.tenders.map(t=>`
        <div class="glass-eme" style="padding:10px 14px;margin-bottom:8px;border-radius:var(--radius-sm);display:flex;justify-content:space-between;align-items:center;">
          <div><div style="font-size:0.85rem;font-weight:500;">${t.title.slice(0,25)}...</div>
            <div style="font-size:0.75rem;color:var(--text-dim);">${t.id}</div></div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-out btn-xs" onclick="toast('BOQ uploaded','eme')"><i class="fas fa-upload"></i></button>
            <button class="btn btn-eme btn-xs" onclick="toast('BOQ downloaded','eme')"><i class="fas fa-download"></i></button>
          </div>
        </div>`).join('')}
    </div>
    <div class="glass-card" style="padding:1.5rem;">
      <h3 style="margin-bottom:1rem;font-size:1rem;">🧮 Bid Cost Estimator</h3>
      <div class="form-group" style="margin-bottom:1rem;"><label>Select Tender</label>
        <select class="form-control" id="bid_tender">${DB.tenders.map(t=>`<option value="${t.id}">${t.title}</option>`).join('')}</select>
      </div>
      <div class="form-grid" style="grid-template-columns:1fr 1fr;">
        <div class="form-group"><label>Material Cost</label><input class="form-control" id="bid_mat" type="number" placeholder="0"></div>
        <div class="form-group"><label>Labour Cost</label><input class="form-control" id="bid_lab" type="number" placeholder="0"></div>
        <div class="form-group"><label>Machinery</label><input class="form-control" id="bid_mach" type="number" placeholder="0"></div>
        <div class="form-group"><label>Overhead %</label><input class="form-control" id="bid_oh" type="number" placeholder="12" value="12"></div>
      </div>
      <div id="bidResult" style="margin-top:1rem;padding:12px;background:rgba(168,85,247,0.1);border-radius:var(--radius-sm);display:none;">
        <div style="font-size:0.8rem;color:var(--text-dim);">Estimated Bid Amount</div>
        <div style="font-size:1.4rem;font-weight:700;color:var(--amb3);" id="bidTotal">₹0</div>
      </div>
      <button class="btn btn-pur" style="margin-top:1rem;" onclick="calcBid()">Calculate Bid</button>
    </div>
  </div>`;
}
function tenderRows(){
  return DB.tenders.map(t=>`
    <tr><td>${t.id}</td><td><strong>${t.title}</strong></td><td>${t.client}</td>
    <td>₹${(t.estValue/10000000).toFixed(2)}Cr</td>
    <td>${t.floatDate}</td><td>${t.submitDate}</td>
    <td>${statusPill(t.status)}</td>
    <td>
      <button class="btn btn-eme btn-xs" onclick="markTenderWon('${t.id}')">Mark Won</button>
      <button class="btn btn-out btn-xs" onclick="editTender('${t.id}')"><i class="fas fa-edit"></i></button>
    </td></tr>`).join('');
}
window.markTenderWon=(id)=>{const t=DB.tenders.find(x=>x.id===id);if(t){t.status='won';t.result='won';toast('Tender marked WON! 🏆','eme');addLog('Tender won: '+id);document.getElementById('tenderTbody').innerHTML=tenderRows();}};
window.filterTenders=(v)=>{const b=document.getElementById('tenderTbody');if(b)b.innerHTML=DB.tenders.filter(t=>t.title.toLowerCase().includes(v)||t.client.toLowerCase().includes(v)).map(t=>tenderRows()).join('')||tenderRows();};
window.filterTendersStatus=(s)=>{const b=document.getElementById('tenderTbody');if(b)b.innerHTML=(s?DB.tenders.filter(t=>t.status===s):DB.tenders).map(t=>`<tr><td>${t.id}</td><td><strong>${t.title}</strong></td><td>${t.client}</td><td>₹${(t.estValue/10000000).toFixed(2)}Cr</td><td>${t.floatDate}</td><td>${t.submitDate}</td><td>${statusPill(t.status)}</td><td><button class="btn btn-eme btn-xs" onclick="markTenderWon('${t.id}')">Mark Won</button></td></tr>`).join('');};
window.calcBid=()=>{
  const mat=+document.getElementById('bid_mat').value||0;
  const lab=+document.getElementById('bid_lab').value||0;
  const mach=+document.getElementById('bid_mach').value||0;
  const oh=+document.getElementById('bid_oh').value||12;
  const sub=mat+lab+mach;
  const total=sub*(1+oh/100);
  document.getElementById('bidResult').style.display='block';
  document.getElementById('bidTotal').textContent=fmt(Math.round(total));
  toast('Bid calculated!','eme');
};
window.openNewTender=()=>{
  showModal(`<div class="modal-box">
    <div class="modal-title">📄 New Tender</div>
    <div class="form-grid" style="grid-template-columns:1fr;">
      <div class="form-group"><label>Tender Title</label><input class="form-control" id="td_title" placeholder="Project description"></div>
      <div class="form-group"><label>Client / Issuing Authority</label><input class="form-control" id="td_client" placeholder="Client name"></div>
      <div class="form-group"><label>Estimated Value (₹)</label><input class="form-control" type="number" id="td_value" placeholder="0"></div>
      <div class="form-group"><label>Float Date</label><input class="form-control" type="date" id="td_float" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="form-group"><label>Submission Date</label><input class="form-control" type="date" id="td_submit"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-out" onclick="closeModal()">Cancel</button>
      <button class="btn btn-pur" onclick="saveTender()">Add Tender</button>
    </div>
  </div>`);
};
window.saveTender=()=>{
  const title=document.getElementById('td_title').value;
  if(!title){toast('Enter tender title','rose');return;}
  const id='TDR-2025-0'+(DB.tenders.length+4);
  DB.tenders.unshift({id,title,client:document.getElementById('td_client').value,
    floatDate:document.getElementById('td_float').value,
    submitDate:document.getElementById('td_submit').value,
    estValue:+document.getElementById('td_value').value,status:'floating',result:''});
  closeModal();toast('Tender added!','eme');addLog('New tender: '+title);document.getElementById('tenderTbody').innerHTML=tenderRows();
};
window.editTender=(id)=>{toast('Edit tender form (simulated)','amb');};

// ===================== HELPERS =====================
function accessDenied(){
  return `<div class="glass-card" style="padding:3rem;text-align:center;">
    <div style="font-size:4rem;margin-bottom:1rem;">🔒</div>
    <div style="font-size:1.2rem;font-weight:600;margin-bottom:0.5rem;">Access Restricted</div>
    <div style="color:var(--text-muted);">Your current role does not have permission to access this module.</div>
    <div style="margin-top:1rem;"><select class="role-select" onchange="document.getElementById('roleSwitcher').value=this.value;switchRole(this.value)">
      <option>Switch Role</option>
      <option value="admin">Admin</option>
    </select></div>
  </div>`;
}

// ===================== INIT =====================
document.addEventListener('DOMContentLoaded',()=>{});
</script>
</body>
</html>
